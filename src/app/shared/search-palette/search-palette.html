<div class="palette-backdrop" (click)="close.emit()"></div>

<div class="palette-modal" role="dialog" aria-modal="true" aria-label="Team search">
  <div class="palette-input-wrap">
    <span class="search-icon">⌕</span>
    <input
      #searchInput
      class="palette-input"
      type="text"
      placeholder="Search teams by name or code…"
      [value]="query()"
      (input)="onQueryChange($any($event.target).value)"
      autocomplete="off"
      spellcheck="false"
    />
  </div>

  <div class="palette-results">
    @if (results().length === 0) {
      <div class="palette-empty">No teams found</div>
    } @else {
      @for (team of results(); track team.code; let i = $index) {
        <button
          class="result-row"
          [class.active]="activeIndex() === i"
          (click)="selectTeam(team)"
          (mouseenter)="activeIndex.set(i)"
        >
          <span class="team-flag">{{ team.flag }}</span>
          <span class="team-name">{{ team.name }}</span>
          <span class="team-code">{{ team.code }}</span>
          <span class="group-badge">Group {{ team.group }}</span>
        </button>
      }
    }
  </div>
</div>
